# Web Integrity Shield Backend Configuration
server.port=8080
server.servlet.context-path=/

# Application name
spring.application.name=Web Integrity Shield Backend

# Logging configuration
logging.level.root=INFO
logging.level.com.wsi.phishing=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ONNX Model Path
onnx.model.path=classpath:models/url_model.onnx

# Calibrated Level-1 phishing threshold (from hardened model calibration)
phishing.level1.threshold=0.003347

# Jackson JSON configuration
spring.jackson.serialization.indent-output=true
spring.jackson.serialization.write-dates-as-timestamps=false

# Server configuration
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# Request timeout
server.tomcat.connection-timeout=30000

# Thread pool
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
